# Netlify configuration for The Hobbinomicon

[build]
  # Build command
  command = "npm run build"
  # Directory with built site
  publish = "dist"

# Form notifications
[build.environment]
  # Astro 6 requires Node.js 22+
  NODE_VERSION = "22"
  # YOUTUBE_CHANNEL_ID is a public identifier (it appears in channel links, the
  # RSS feed, and src/data/youtube-comments.json), so exclude it from secrets
  # scanning. YOUTUBE_API_KEY is intentionally NOT listed — it stays scanned.
  SECRETS_SCAN_OMIT_KEYS = "YOUTUBE_CHANNEL_ID"

# Email notification for form submissions
# Form submissions will be sent to the email configured in Netlify dashboard
# You can configure this at: Site Settings > Forms > Form notifications

# Redirect rules for better UX
[[redirects]]
  from = "/contact-success"
  to = "/contact-success"
  status = 200
  force = false

# Projects section retired — content relocated to game pages, or archived.
# Specific relocations first, then a catch-all to the directory.
[[redirects]]
  from = "/projects/motley-crews"
  to = "/games/motley-crews/"
  status = 301
[[redirects]]
  from = "/projects/trench-pilgrims"
  to = "/games/trench-crusade/"
  status = 301
[[redirects]]
  from = "/projects/*"
  to = "/games/"
  status = 301

# Vlogs listing rebuilt as topic-organized Videos. Individual video posts stay
# at /blog/... (unchanged); only the old listing/pagination redirects.
[[redirects]]
  from = "/vlogs"
  to = "/videos/"
  status = 301
[[redirects]]
  from = "/vlogs/*"
  to = "/videos/"
  status = 301

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Persist the YouTube thumbnail caches between builds.
# scripts/download-hero-images.js mirrors a single download into both
# directories and skips any file that already exists. Restoring these
# folders before the build means only newly-published vlogs incur a
# download on each deploy.
[[plugins]]
  package = "netlify-plugin-cache"

  [plugins.inputs]
    paths = ["src/assets/hero-cache", "src/assets/images/hero-cache"]
